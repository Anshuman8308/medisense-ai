# ── render.yaml — Render.com deployment blueprint ─────────────────────────────
# Deploy: connect your GitHub repo to Render, it reads this file automatically.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: medisense-ai-backend
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python ml/train_model.py
    startCommand: gunicorn "backend.app:create_app()" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "false"
      - key: GOOGLE_MAPS_API_KEY
        sync: false          # set this manually in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
    autoDeploy: true
    healthCheckPath: /api/health
